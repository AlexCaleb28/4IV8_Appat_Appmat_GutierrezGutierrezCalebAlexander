<!DOCTYPE html>
<html lang="es">
<head>

    <title>Inventario Tecnolonngis - Caleb</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="datos-alumno">Gutiérrez Gutiérrez Caleb 4IV8</div>
        
        <h1>TECNOLONNGIS</h1>
        <p>Sistema de Control de Ventas e Inventario</p>

        <hr>

        <p>Nombre del Producto:</p>
        <input type="text" id="nombre">

        <p>Cantidad de Producto:</p>
        <input type="text" id="codigo">

        <p>Precio de Venta:</p>
        <input type="text" id="precio">

        <p>Correo de quien registra (obligatorio):</p>
        <input type="text" id="correo">

        <p>Fecha de salida:</p>
        <input type="text" id="fecha">

        <p>Observaciones de la venta:</p>
        <textarea id="comentarios"></textarea>

        <br>

        <button onclick="validar()">Finalizar Registro de Venta</button>
    </div>
